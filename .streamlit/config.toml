[server]
# 파일 변경 시 자동 리로드 비활성화 (코드 수정 중 파이프라인 중단 방지)
fileWatcherType = "none"
enableStaticServing = false

# --- Cloudflare 터널(WSL) 뒤에서 서비스하기 위한 설정 ---
# 모든 인터페이스에 바인딩 → WSL이 Windows 호스트 IP로 접속 가능
address = "0.0.0.0"
port = 8501
headless = true
# 터널(리버스 프록시) 뒤에서는 CORS/XSRF 검사가 웹소켓을 막을 수 있어 비활성화
enableCORS = false
enableXsrfProtection = false

[browser]
serverPort = 8501
gatherUsageStats = false